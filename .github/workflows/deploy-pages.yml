name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: install wasm-tools
        run: dotnet workload install wasm-tools

      # Pages must use Source: GitHub Actions (once per repo under Settings → Pages); see README Troubleshooting.

      - name: restore wasm only
        run: >
          dotnet restore LabsAuroraGallery/LabsAuroraGallery.csproj
          -p:TargetFrameworks=net9.0-browserwasm

      - name: publish wasm
        run: >
          dotnet publish LabsAuroraGallery/LabsAuroraGallery.csproj
          --no-restore
          -c Release -f net9.0-browserwasm
          -o artifacts/wasm
          -p:TreatWarningsAsErrors=true
          -p:TargetFrameworks=net9.0-browserwasm
          -p:WasmShellWebAppBasePath=/labs-aurora-gallery/

      # why: _framework starts with underscore, Jekyll would drop it on Pages
      - name: disable jekyll
        run: touch artifacts/wasm/wwwroot/.nojekyll

      - name: validate wasm artifact
        shell: bash
        run: |
          set -euo pipefail
          WWWROOT=artifacts/wasm/wwwroot
          test -f "$WWWROOT/index.html" || { echo "missing index.html"; exit 1; }
          test -f "$WWWROOT/Fonts.css" || { echo "missing Fonts.css (WasmCSS pipeline)"; exit 1; }
          test -s "$WWWROOT/Fonts.css" || { echo "Fonts.css empty"; exit 1; }
          grep -qE '@import|fonts\.googleapis\.com' "$WWWROOT/Fonts.css" || \
            { echo "Fonts.css missing Google Fonts @import wiring"; exit 1; }
          test -f "$WWWROOT/.nojekyll"
          WASM_COUNT=$(find "$WWWROOT" -name '*.wasm' -type f ! -path '*/downloads/*' | wc -l | tr -d ' ')
          if [ "$WASM_COUNT" -lt 1 ]; then echo "no .wasm bundles under wwwroot"; exit 1; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wasm/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
