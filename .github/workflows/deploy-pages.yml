name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: install wasm-tools
        run: dotnet workload install wasm-tools

      # Pages must use Source: GitHub Actions (once per repo under Settings → Pages); see README Troubleshooting.

      - name: restore wasm only
        run: >
          dotnet restore LabsAuroraGallery/LabsAuroraGallery.csproj
          -p:TargetFrameworks=net9.0-browserwasm

      - name: publish wasm
        run: >
          dotnet publish LabsAuroraGallery/LabsAuroraGallery.csproj
          --no-restore
          -c Release -f net9.0-browserwasm
          -o artifacts/wasm
          -p:TreatWarningsAsErrors=true
          -p:TargetFrameworks=net9.0-browserwasm
          -p:WasmShellWebAppBasePath=/labs-aurora-gallery/

      # why: _framework starts with underscore, Jekyll would drop it on Pages
      - name: disable jekyll
        run: touch artifacts/wasm/wwwroot/.nojekyll

      # Uno 6+ places Fonts.css under wwwroot/package_<hash>/ (not wwwroot root).
      # Managed assemblies may be listed in _framework/blazor.boot.json without loose *.wasm on disk in some publish modes.
      - name: validate wasm artifact
        shell: bash
        run: |
          set -euo pipefail
          WWWROOT=artifacts/wasm/wwwroot
          test -f "$WWWROOT/index.html" || { echo "missing index.html"; exit 1; }
          FONTS_CSS=$(find "$WWWROOT" -name 'Fonts.css' -type f ! -path '*/downloads/*' | head -n1 || true)
          if [ -z "$FONTS_CSS" ]; then echo "missing Fonts.css (WasmCSS) anywhere under wwwroot"; exit 1; fi
          test -s "$FONTS_CSS" || { echo "Fonts.css empty: $FONTS_CSS"; exit 1; }
          grep -qE '@import|fonts\.googleapis\.com' "$FONTS_CSS" || \
            { echo "Fonts.css missing Google Fonts @import wiring: $FONTS_CSS"; exit 1; }
          test -f "$WWWROOT/.nojekyll"
          BOOT="$WWWROOT/_framework/blazor.boot.json"
          test -f "$BOOT" || { echo "missing _framework/blazor.boot.json"; exit 1; }
          grep -qE '\.wasm' "$BOOT" || { echo "blazor.boot.json lists no .wasm resources"; exit 1; }
          echo "OK: index.html, $(basename "$(dirname "$FONTS_CSS")")/Fonts.css, boot manifest"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wasm/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
